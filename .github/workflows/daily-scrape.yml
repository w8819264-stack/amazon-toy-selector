name: Daily Amazon Toy Report

on:
  schedule:
    # 每天 UTC 0:00 运行（北京时间 8:00）
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

# 需要写入权限来推送变更
permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl curl_cffi beautifulsoup4

      - name: Run daily pipeline
        run: python main.py

      - name: Commit & Push if changed
        run: |
          git config user.name "Amazon Bot"
          git config user.email "bot@amazon-toy-selector.local"
          git add index.html data/
          # 如果有变更才提交
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Daily report update: $(date +'%Y-%m-%d')"
            git push
            echo "✅ Changes pushed!"
          fi
